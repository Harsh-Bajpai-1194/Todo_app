server {
  listen 80;

  # Root directory for static files
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API and Socket.io requests to the backend server
  location /api {
    proxy_pass http://server:5000; # 'server' is the name of our backend service in docker-compose
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # Proxy Socket.io requests to the backend server
  location /socket.io/ {
    proxy_pass http://server:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
  }

  # Handle client-side routing for single-page applications
  location / {
    try_files $uri $uri/ /index.html;
  }
}
